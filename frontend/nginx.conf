server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # Root - redirect to app dashboard
    location = / {
        return 301 /app/dashboard;
    }

    # React app assets (must come before /app location)
    # ^~ modifier gives this location priority over regex locations
    location ^~ /app/assets/ {
        alias /usr/share/nginx/html/assets/;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # React app - all routes under /app
    location /app/ {
        try_files $uri $uri/ /index.html;
    }

    # React app - handle /app without trailing slash
    location = /app {
        return 301 /app/;
    }

    # Images and static assets
    location /images/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Cache other static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Health check endpoint
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }
}
